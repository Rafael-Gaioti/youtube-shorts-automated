# YouTube Shorts Automation - Configuration File

# Project Paths
paths:
  data_root: "data"
  raw_videos: "data/raw"
  transcripts: "data/transcripts"
  analysis: "data/analysis"
  output: "data/output"
  models: "models"
  logs: "logs"
  prompts: "config/prompts"

# Whisper Configuration (Optimized for RTX 4060)
whisper_config:
  model_size: "large-v3" # Options: tiny, base, small, medium, large-v2, large-v3
  device: "cuda" # Use GPU acceleration
  compute_type: "float16" # Optimized for RTX 4060 (8GB VRAM)
  beam_size: 5
  language: "pt" # Portuguese
  task: "transcribe"
  vad_filter: true # Voice Activity Detection
  vad_parameters:
    threshold: 0.5
    min_speech_duration_ms: 250
    max_speech_duration_s: 30
    min_silence_duration_ms: 500

# AI Analysis Configuration
ai_provider: "openai" # Options: openai, claude, ollama

# Claude API Configuration
claude_config:
  model: "claude-3-5-sonnet-20241022" # Latest 3.5 Sonnet model
  max_tokens: 4000
  temperature: 0.7
  top_p: 0.9
  timeout: 300 # seconds

# OpenAI API Configuration
openai_config:
  model: "gpt-4o" # Latest GPT-4o model
  max_tokens: 4000
  temperature: 0.7
  timeout: 300 # seconds

# Ollama (Local LLM) Configuration
ollama_config:
  model: "llama3" # Or "llama3.1", "mistral", etc.
  base_url: "http://localhost:11434/v1" # Ollama's OpenAI-compatible endpoint
  max_tokens: 4000
  temperature: 0.1 # Lower temperature for more structured JSON output
  timeout: 600 # seconds (local models might be slower)

# Video Processing Configuration
video_config:
  output_format: "mp4"
  resolution: "1080x1920" # Vertical format for Shorts
  fps: 30
  video_codec: "libx264"
  audio_codec: "aac"
  audio_bitrate: "192k"
  video_bitrate: "5000k"
  preset: "medium" # Options: ultrafast, superfast, veryfast, faster, fast, medium, slow, slower, veryslow
  crf: 23 # Constant Rate Factor (lower = better quality, 18-28 recommended)

# YouTube Download Configuration
download_config:
  format: "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best"
  max_resolution: "1080p"
  extract_audio: true
  audio_format: "mp3"
  subtitle_langs: ["pt", "en"]

# Cuts Analysis Configuration
cuts_config:
  min_duration: 25 # seconds (aumentado para garantir densidade de conteúdo e qualidade de podcast)
  max_duration: 55 # seconds (limite do Shorts é 60s)
  target_duration: 35 # ideal duration
  min_viral_score: 5.0 # fallback — perfis em user_profiles.json têm prioridade (recommended=4.0)
  max_cuts_per_video: 5 # maximum number of cuts to extract from analysis
  max_cuts_to_export: 3 # maximum number of cuts to actually export (best ones)
  overlap_tolerance: 2 # seconds of allowed overlap between cuts

# Logging Configuration
logging:
  level: "INFO" # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"
  file_logging: true
  console_logging: true

# Performance Configuration
performance:
  use_gpu: true
  batch_size: 16 # for Whisper processing
  num_workers: 4 # parallel processing threads
  cache_enabled: true
